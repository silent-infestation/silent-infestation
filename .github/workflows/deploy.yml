  deploy:
    # needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: 📡 Connexion SSH et exécution du script de déploiement
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY_GHA }}
          envs: DOCKER_USERNAME=$DOCKER_USERNAME,DOCKER_PASSWORD=$DOCKER_PASSWORD,PROJECT_PATH=$PROJECT_PATH
          script: |
            echo "✅ Connexion réussie au serveur"
            whoami
            hostname
            ls -la $PROJECT_PATH
            cd $PROJECT_PATH
            ./deploy.sh
